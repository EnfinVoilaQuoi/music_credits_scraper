# CI : rejoue les vérifications qualité sur machine vierge à chaque push.
# Intérêt clé (AUDIT §7 point 9) : le runner part d'un checkout PROPRE — la
# classe de bugs « ça marche chez moi car ma vieille base/mes fichiers data/
# masquent le problème » (ex. P0 §3.1) est détectée au premier push.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    # windows-latest : mêmes conditions que le poste de dev (app Windows-only)
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Ruff (lint)
        run: ruff check src scripts tests

      - name: Black (formatage)
        run: black --check src scripts tests

      # Garde-fou refacto Phase 4 (couche « domaine ») : le modèle et le mapper
      # n'accèdent JAMAIS à leurs propres champs via getattr/hasattr défensif —
      # un champ manquant doit crasher tôt, pas produire un None trois couches
      # plus loin. Les coercitions DB→objet vivent, elles, dans track_mapper
      # (frontière, seul habitat légal). Empêche le retour du pattern.
      - name: Garde-fou domaine (getattr/hasattr défensif)
        shell: bash
        run: |
          if grep -rnE "getattr\((self|track)|hasattr\((self|track)" src/models/ src/utils/track_mapper.py; then
            echo "::error::getattr/hasattr défensif détecté dans le domaine (src/models ou track_mapper) — accès direct attendu."
            exit 1
          fi
          echo "OK : aucun accès défensif dans le domaine."

      - name: Pytest
        run: pytest -q
